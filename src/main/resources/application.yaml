server:
  port: 51720

spring:
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: store-auth
  datasource:
    url: jdbc:postgresql://store-auth-db:5432/storeauthdb
    username: postgres
    password: 1
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: "kafka:9092"
    producer:
      acks: all
      compression-type: zstd
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: store-auth-group
      auto-offset-reset: earliest
      enable-auto-commit: false

jwt:
  issuer: axgiri@proton.me
  ttl-minutes: 15
  refresh-ttl-days: 30
  refresh-token-secret: 123456789qwerty123456789qwerty123456789qwerty
  public-key: classpath:keys/public.pem
  private-key: classpath:keys/private.pem

app:
  otp-ttl-minutes: 15
  kafka:
    topic:
      message: message-topic
      registration: registration-topic
      registration-compensate: registration-compensate-topic
    replicas: 3
    min-insync-replicas: 2
  
logging:
  level:
    root: INFO
    org:
      apache:
        kafka: WARN

management:
  server:
    port: 51721
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0 
      # 100% of requests are traced. must lower to 0.1-0.5 in server for optimization
  otlp:
    tracing:
      endpoint: http://alloy:4318/v1/traces
    metrics:
      export:
        enabled: false