services:
  oldlab-auth:
    image: eclipse-temurin:21-jdk-alpine
    container_name: oldlab-auth
    hostname: oldlab-auth
    ports:
      - "51720:51720"
    volumes:
    - ./:/app
    working_dir: /app
    command: ./gradlew bootRun
    depends_on:
      - oldlab-auth-db
    networks:
      - oldlab-network
    restart: on-failure:3
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
        
  oldlab-auth-db:
    image: postgres:13-alpine
    container_name: oldlab-auth-db
    ports:
      - "51721:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: oldlabauthdb
    volumes:
      - oldlab-auth-db_data:/var/lib/postgresql/data
    networks:
      - oldlab-network
    restart: on-failure:3
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

