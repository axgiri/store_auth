services:
  store-auth:
    image: eclipse-temurin:21-jdk-alpine
    container_name: store-auth
    hostname: store-auth
    ports:
      - "51720:51720"
    volumes:
    - ./:/app
    working_dir: /app
    command: ./gradlew bootRun
    depends_on:
      - store-auth-db
    networks:
      - store-network
    restart: on-failure:3
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
        
  store-auth-db:
    image: postgres:13-alpine
    container_name: store-auth-db
    ports:
      - "51721:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: storeauthdb
    volumes:
      - store-auth-db_data:/var/lib/postgresql/data
    networks:
      - store-network
    restart: on-failure:3
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

networks:
  store-network:
    external: true

volumes:
  store-auth-db_data: